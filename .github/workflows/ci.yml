name: CI

on:
  pull_request:
  push:
    branches: [ main ]

env:
  BUNDLE_RUBYGEMS__PKG__GITHUB__COM: ${{ secrets.BUNDLE_RUBYGEMS__PKG__GITHUB__COM }}

jobs:
  scan_ruby:
    runs-on: arc-runner-set

    steps:
      - name: Prepare tool cache
        run: sudo mkdir -p /opt/hostedtoolcache && sudo chmod -R 777 /opt/hostedtoolcache

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y build-essential libpq-dev libyaml-dev

      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1

      - name: Re-resolve fluyenta-ui from GitHub Packages
        run: bundle lock --update fluyenta-ui

      - name: Bundle install
        run: bundle install --jobs 4

      - name: Scan for common Rails security vulnerabilities using static analysis
        run: bin/brakeman --no-pager

      - name: Scan for known security vulnerabilities in gems used
        run: bin/bundler-audit

  lint:
    runs-on: arc-runner-set
    env:
      RUBOCOP_CACHE_ROOT: tmp/rubocop
    steps:
      - name: Prepare tool cache
        run: sudo mkdir -p /opt/hostedtoolcache && sudo chmod -R 777 /opt/hostedtoolcache

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y build-essential libpq-dev libyaml-dev

      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1

      - name: Re-resolve fluyenta-ui from GitHub Packages
        run: bundle lock --update fluyenta-ui

      - name: Bundle install
        run: bundle install --jobs 4

      - name: Prepare RuboCop cache
        uses: actions/cache@v4
        env:
          DEPENDENCIES_HASH: ${{ hashFiles('.ruby-version', '**/.rubocop.yml', '**/.rubocop_todo.yml', 'Gemfile.lock') }}
        with:
          path: ${{ env.RUBOCOP_CACHE_ROOT }}
          key: rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-${{ github.ref_name == github.event.repository.default_branch && github.run_id || 'default' }}
          restore-keys: |
            rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-

      - name: Lint code for consistent style
        run: bin/rubocop -f github

  test:
    runs-on: arc-runner-set

    services:
      postgres:
        image: timescale/timescaledb:latest-pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: --health-cmd="pg_isready" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Prepare tool cache
        run: sudo mkdir -p /opt/hostedtoolcache && sudo chmod -R 777 /opt/hostedtoolcache

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y build-essential libpq-dev libyaml-dev

      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1

      - name: Re-resolve fluyenta-ui from GitHub Packages
        run: bundle lock --update fluyenta-ui

      - name: Bundle install
        run: bundle install --jobs 4

      - name: Run tests
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:postgres@localhost:5432
        run: bin/rails db:test:prepare && bundle exec rspec

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: brainz-lab/signal
          files: ./coverage/.resultset.json
          fail_ci_if_error: false
